<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Map Generator</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <header class="brand">
                <div class="brand__mark" aria-hidden="true">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
                        <circle cx="3" cy="3" r="1.5"/><circle cx="8" cy="3" r="1.5"/><circle cx="13" cy="3" r="1.5"/>
                        <circle cx="3" cy="8" r="1.5"/><circle cx="8" cy="8" r="1.5"/><circle cx="13" cy="8" r="1.5"/>
                        <circle cx="3" cy="13" r="1.5"/><circle cx="8" cy="13" r="1.5"/><circle cx="13" cy="13" r="1.5"/>
                    </svg>
                </div>
                <div class="brand__text">
                    <h1>Dot Map Gen</h1>
                    <p>Stippled world maps</p>
                </div>
            </header>

            <div class="sidebar__body">
                <section class="group">
                    <h2 class="group__title">Projection</h2>
                    <div class="field">
                        <select id="projection" aria-label="Map projection">
                            <optgroup label="Cylindrical">
                                <option value="geoEquirectangular">Equirectangular</option>
                                <option value="geoMercator">Mercator</option>
                                <option value="geoTransverseMercator">Transverse Mercator</option>
                                <option value="geoMiller">Miller</option>
                                <option value="geoCylindricalEqualArea">Cylindrical Equal Area</option>
                            </optgroup>
                            <optgroup label="Pseudocylindrical">
                                <option value="geoEqualEarth">Equal Earth</option>
                                <option value="geoNaturalEarth1">Natural Earth</option>
                                <option value="geoNaturalEarth2">Natural Earth II</option>
                                <option value="geoRobinson">Robinson</option>
                                <option value="geoMollweide">Mollweide</option>
                                <option value="geoSinusoidal">Sinusoidal</option>
                                <option value="geoEckert4">Eckert IV</option>
                                <option value="geoEckert6">Eckert VI</option>
                                <option value="geoWagner6">Wagner VI</option>
                                <option value="geoKavrayskiy7">Kavrayskiy VII</option>
                                <option value="geoPatterson">Patterson</option>
                                <option value="geoBoggs">Boggs Eumorphic</option>
                            </optgroup>
                            <optgroup label="Compromise">
                                <option value="geoWinkel3">Winkel Tripel</option>
                                <option value="geoAitoff">Aitoff</option>
                                <option value="geoHammer">Hammer</option>
                                <option value="geoVanDerGrinten">Van der Grinten</option>
                                <option value="geoVanDerGrinten4">Van der Grinten IV</option>
                            </optgroup>
                            <optgroup label="Conic">
                                <option value="geoAlbers">Albers</option>
                                <option value="geoConicEqualArea">Conic Equal Area</option>
                                <option value="geoConicEquidistant">Conic Equidistant</option>
                                <option value="geoBonne">Bonne</option>
                                <option value="geoPolyconic">Polyconic</option>
                            </optgroup>
                            <optgroup label="Azimuthal">
                                <option value="geoOrthographic">Orthographic</option>
                                <option value="geoStereographic">Stereographic</option>
                                <option value="geoGnomonic">Gnomonic</option>
                                <option value="geoAzimuthalEqualArea">Azimuthal Equal Area</option>
                                <option value="geoAzimuthalEquidistant">Azimuthal Equidistant</option>
                            </optgroup>
                            <optgroup label="Interrupted">
                                <option value="geoInterruptedHomolosine">Goode Homolosine</option>
                                <option value="geoInterruptedMollweide">Interrupted Mollweide</option>
                                <option value="geoInterruptedBoggs">Interrupted Boggs</option>
                                <option value="geoInterruptedSinusoidal">Interrupted Sinusoidal</option>
                                <option value="geoBerghaus">Berghaus Star</option>
                            </optgroup>
                        </select>
                    </div>
                </section>

                <section class="group">
                    <h2 class="group__title">Colors</h2>
                    <div class="field">
                        <label for="colorScheme">Scheme</label>
                        <select id="colorScheme">
                            <option value="rainbow">Rainbow</option>
                            <option value="greyscale">Greyscale</option>
                            <option value="monotone">Monotone</option>
                        </select>
                    </div>
                    <div class="field" id="monotoneControls" style="display: none;">
                        <label for="baseColor">Base color</label>
                        <input type="color" id="baseColor" value="#4444ff">
                    </div>
                    <div class="field" id="rainbowControls">
                        <label for="rainbowSeed">Seed</label>
                        <div class="seed">
                            <input type="number" id="rainbowSeed" value="1" min="0" step="1">
                            <button id="randomizeSeed" class="icon-btn" type="button" title="Randomize seed" aria-label="Randomize seed">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/>
                                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/>
                                </svg>
                            </button>
                        </div>
                        <p class="hint">Same seed → same palette. Reroll for a new one.</p>
                    </div>
                </section>

                <section class="group">
                    <h2 class="group__title">Dots</h2>
                    <div class="grid-2">
                        <div class="field">
                            <label for="spacing">Spacing</label>
                            <input type="number" id="spacing" value="10" min="1" max="50">
                        </div>
                        <div class="field">
                            <label for="dotSize">Dot size</label>
                            <input type="number" id="dotSize" value="3" min="1" max="10">
                        </div>
                    </div>
                    <p class="hint">Lower spacing = more dots (and slower).</p>
                    <div class="toggles">
                        <label class="toggle">
                            <input type="checkbox" id="showDots" checked>
                            <span class="toggle__box"></span>
                            <span class="toggle__label">Land dots</span>
                        </label>
                        <label class="toggle">
                            <input type="checkbox" id="showOceanDots">
                            <span class="toggle__box"></span>
                            <span class="toggle__label">Ocean dots</span>
                        </label>
                    </div>
                </section>

                <section class="group">
                    <h2 class="group__title">Layers</h2>
                    <div class="toggles">
                        <label class="toggle">
                            <input type="checkbox" id="showCountries">
                            <span class="toggle__box"></span>
                            <span class="toggle__label">Land shape</span>
                        </label>
                        <label class="toggle">
                            <input type="checkbox" id="showOcean">
                            <span class="toggle__box"></span>
                            <span class="toggle__label">Ocean fill</span>
                        </label>
                        <label class="toggle">
                            <input type="checkbox" id="showOutline" checked>
                            <span class="toggle__box"></span>
                            <span class="toggle__label">Outline</span>
                        </label>
                        <label class="toggle">
                            <input type="checkbox" id="showGraticules">
                            <span class="toggle__box"></span>
                            <span class="toggle__label">Grid lines</span>
                        </label>
                    </div>
                </section>

                <section class="group">
                    <h2 class="group__title">Render size</h2>
                    <div class="grid-2">
                        <div class="field">
                            <label for="renderWidth">Width</label>
                            <input type="number" id="renderWidth" value="1920" min="800" max="7680" step="10">
                        </div>
                        <div class="field">
                            <label for="renderHeight">Height</label>
                            <input type="number" id="renderHeight" value="1080" min="600" max="4320" step="10">
                        </div>
                    </div>
                    <p class="hint">Output resolution used for export (px).</p>
                </section>

                <section class="group">
                    <h2 class="group__title">Options</h2>
                    <div class="toggles">
                        <label class="toggle">
                            <input type="checkbox" id="enableHover" checked>
                            <span class="toggle__box"></span>
                            <span class="toggle__label">Tooltips</span>
                        </label>
                    </div>
                </section>
            </div>

            <footer class="sidebar__footer">
                <button id="downloadSvg" class="btn btn--primary">Download SVG</button>
                <button id="downloadPng" class="btn btn--ghost">Download PNG</button>
            </footer>
        </aside>

        <main class="stage">
            <div class="stage__progress"><div class="stage__bar" id="progressBarFill"></div></div>
            <div id="progressIndicator" class="pill" style="display: none;">Initializing…</div>

            <div class="map-wrapper">
                <svg id="map"></svg>
            </div>

            <div id="performanceInfo" class="card card--top-right" style="display: none;"></div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-geo-projection@4"></script>

    <script src="worker-pool.js"></script>
    <script src="index.js"></script>
</body>
</html>
